version: '3.8'

services:
  # PostgreSQL pour le backend REAAGES
  postgres:
    image: postgres:15
    container_name: reaages-postgres
    environment:
      POSTGRES_DB: reaages
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - reaages-network

  # Keycloak pour l'authentification
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: reaages-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    command: start-dev
    networks:
      - reaages-network

  # Base de données pour Keycloak
  keycloak-db:
    image: postgres:15
    container_name: reaages-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - reaages-network

  # Backend API (optionnel - pour développement)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reaages-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: reaages
      DB_USER: postgres
      DB_PASSWORD: postgres123
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: reaages
      KEYCLOAK_CLIENT_ID: reaages-backend
      KEYCLOAK_CLIENT_SECRET: your_client_secret_here
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - keycloak
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - reaages-network
    command: npm run dev

  # Frontend (optionnel - pour développement)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: reaages-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080/auth
      NEXT_PUBLIC_KEYCLOAK_REALM: reaages
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: reaages-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - keycloak
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - reaages-network
    command: npm run dev

volumes:
  postgres_data:
  keycloak_data:

networks:
  reaages-network:
    driver: bridge