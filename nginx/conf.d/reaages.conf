# ================================================================
#  reaages.gis-master.com
#  HTTP  → 80  (redirige vers HTTPS)
#  HTTPS → 443 (standard — URL sans port)
# ================================================================

# ── Healthcheck interne ───────────────────────────────────────
server {
    listen 8080 default_server;
    server_name _;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Tout le reste → HTTPS (sans port dans l'URL)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Serveur HTTPS principal ────────────────────────────────────
server {
    listen 8443 ssl;
    http2  on;
    server_name reaages.gis-master.com;

    # ── Certificats SSL ───────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    # ── Headers de sécurité ───────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"       always;
    add_header X-Content-Type-Options     "nosniff"          always;
    add_header X-XSS-Protection           "1; mode=block"    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: https:; \
         font-src 'self'; \
         connect-src 'self' https://reaages.gis-master.com; \
         frame-ancestors 'self';" always;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req  zone=global burst=50 nodelay;
    limit_conn conn 20;

    # ── Proxy général → Frontend Next.js ──────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Cache statique Next.js
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:3000;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, immutable";
            access_log off;
        }
    }

    # ── API Backend Express ────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  443;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Pas de cache sur les APIs
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Auth endpoints (rate limit strict) ────────────────────
    location ~ ^/api/(auth|login|register) {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  443;
    }

    # ── Uploads (limite taille) ───────────────────────────────
    location /api/upload {
        client_max_body_size 20m;
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Bloquer accès fichiers sensibles ──────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|sql|sh|bak|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
